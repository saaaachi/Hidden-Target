<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Search - Brain Focus</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #fffde7; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        
        /* 広告枠：150px (他ゲームと統一) */
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 150px; background: #222; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; border-bottom: 2px solid #fbc02d; } 
        #ad-bottom { bottom: 0; border-top: 2px solid #fbc02d; }

        /* ゲーム本体エリア */
        #game-outer { position: absolute; top: 150px; bottom: 150px; left: 0; right: 0; background: #fffde7; overflow: hidden; }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px; }
        
        /* UIエリア */
        #header-ui { width: 100%; display: flex; justify-content: space-around; padding: 8px 0; z-index: 10; max-width: 340px; }
        .info-box { font-size: 16px; font-weight: bold; color: #f57f17; background: white; padding: 6px 12px; border-radius: 15px; box-shadow: 0 3px #fbc02d; min-width: 110px; text-align: center; }
        #timer-text { color: #e91e63; border: 1px solid #ff80ab; }

        /* グリッド：6x6 */
        #grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; 
            padding: 10px; width: 100%; max-width: 360px; 
        }
        .cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; background: white; border-radius: 8px; box-shadow: 0 4px #fbc02d; 
            cursor: pointer; user-select: none; transition: transform 0.05s;
        }
        .cell:active { transform: scale(0.9); box-shadow: 0 1px #fbc02d; }
        
        /* 正解発表時のエフェクト */
        .cell.correct-answer { background: #ffff00 !important; border: 4px solid #e91e63; box-shadow: 0 0 15px #e91e63; z-index: 10; transform: scale(1.15); animation: flash 0.3s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.7; } }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.97); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; 
            padding: 20px;
        }

        /* 【収益】300x250 レクタングル */
        #ad-middle-box { 
            width: 300px; height: 250px; background: #f5f5f5; margin: 15px 0; 
            display: none; justify-content: center; align-items: center; 
            border-radius: 12px; border: 1px solid #ddd; overflow: hidden;
        }

        .btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .menu-btn { width: 260px; padding: 18px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #fbc02d; color: #333; box-shadow: 0 5px #f57f17; }
        #retry-btn:disabled { background: #ccc; color: #888; box-shadow: none; transform: none; }
        .link-btn { background: #ff4081; color: white; box-shadow: 0 5px #c2185b; font-size: 16px; }

        /* インタースティシャル風 全画面広告 */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="main-container">
            <div id="header-ui">
                <div id="ui" class="info-box">SCORE: 0</div>
                <div id="timer-text" class="info-box">残り: 7.0s</div>
            </div>
            <div style="font-weight:bold; color:#f57f17; margin: 10px 0; font-size: 15px; text-shadow: 1px 1px 0 #fff;">仲間はずれを1つ探せ！</div>
            
            <div id="grid"></div>

            <div id="menuScreen">
                <h2 id="result-msg" style="color:#f57f17; margin: 5px 0; font-size: 28px;">Target Search</h2>
                <p id="sub-msg" style="font-size: 15px; color: #666; margin: 0 0 10px 0; text-align: center;">1つだけ違う文字はどこ？</p>
                
                <div id="ad-middle-box">
                    <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div class="btn-group">
                    <button id="retry-btn" onclick="startNewGame()">スタート！</button>
                    <a href="https://saaaachi.github.io/" class="link-btn menu-btn">他のゲームも見る</a>
                </div>
            </div>

            <div id="inter-screen">
                <div class="inter-content">
                    <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                    <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="ad-bottom">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        let score = 0, gameActive = false, timeLeft, countdownInterval, playCount = 0;
        let targetElement = null;
        // ペアとなる文字リストを拡充
        const chars = ["大", "太", "犬", "天", "矢", "失", "白", "百", "問", "間", "己", "已", "徴", "微", "幸", "辛", "由", "甲", "買", "貝", "右", "石", "左", "在", "目", "日", "輪", "輸"];

        const menuScreen = document.getElementById("menuScreen"), adMid = document.getElementById("ad-middle-box"), 
              resultMsg = document.getElementById("result-msg"), retryBtn = document.getElementById("retry-btn"), 
              grid = document.getElementById("grid");

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0; gameActive = true;
            document.getElementById("ui").innerText = "SCORE: 0";
            nextLevel();
        }

        function nextLevel() {
            if(!gameActive) return;
            grid.innerHTML = "";
            const pairIdx = Math.floor(Math.random() * (chars.length / 2)) * 2;
            const base = chars[pairIdx];
            const target = chars[pairIdx + 1];
            const targetIdx = Math.floor(Math.random() * 36);

            for(let i=0; i<36; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.innerText = (i === targetIdx) ? target : base;
                if(i === targetIdx) targetElement = cell;
                
                // タップイベント（即時性重視）
                cell.onpointerdown = (e) => {
                    e.preventDefault();
                    if(!gameActive) return;
                    if(i === targetIdx) { 
                        score++; 
                        document.getElementById("ui").innerText = "SCORE: " + score; 
                        nextLevel(); 
                    } else { 
                        gameOver("ちがうよ！😱"); 
                    }
                };
                grid.appendChild(cell);
            }

            // スコアが上がるほど制限時間が厳しくなる（最小1.2秒まで）
            timeLeft = Math.max(1.2, 7.0 - (score * 0.4)); 
            startCountdown();
        }

        function startCountdown() {
            clearInterval(countdownInterval);
            updateTimerText();
            countdownInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerText();
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    gameOver("時間切れ！⏳");
                }
            }, 100);
        }

        function updateTimerText() {
            document.getElementById("timer-text").innerText = "残り: " + Math.max(0, timeLeft).toFixed(1) + "s";
        }

        function gameOver(msg) {
            gameActive = false; playCount++; clearInterval(countdownInterval);
            if(targetElement) targetElement.classList.add('correct-answer');

            // 演出後にメニューを表示
            setTimeout(() => {
                resultMsg.innerText = "GAME OVER";
                document.getElementById("sub-msg").innerHTML = msg + "<br>SCORE: " + score;
                
                retryBtn.innerText = "お待ちください...";
                retryBtn.disabled = true;
                adMid.style.display = "flex";
                menuScreen.style.display = "flex";

                // リトライボタン有効化
                setTimeout(() => {
                    retryBtn.disabled = false;
                    retryBtn.innerText = "もう一度遊ぶ";
                }, 1500);

                // インタースティシャル広告（4回毎）
                if (playCount % 4 === 0) {
                    setTimeout(showInterAd, 500);
                }
            }, 800);
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
