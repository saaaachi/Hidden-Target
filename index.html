<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Target - v26.1</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #fffde7; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        
        /* 広告枠：150px (他ゲームと統一) */
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 150px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; border-bottom: 1px solid #444; } 
        #ad-bottom { bottom: 0; border-top: 1px solid #444; }
        iframe { border: none; width: 100%; height: 150px; background: #333; }

        /* ゲーム本体エリア */
        #game-outer { position: absolute; top: 150px; bottom: 150px; left: 0; right: 0; background: #fffde7; overflow: hidden; }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* UIエリア */
        #header-ui { width: 100%; display: flex; justify-content: space-around; padding: 5px 0; z-index: 10; }
        .info-box { font-size: 16px; font-weight: bold; color: #f57f17; background: white; padding: 4px 10px; border-radius: 12px; box-shadow: 0 2px #fbc02d; }
        #timer-text { color: #e91e63; }

        /* グリッド */
        #grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; 
            padding: 8px; width: 95%; max-width: 340px; 
        }
        .cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; background: white; border-radius: 6px; box-shadow: 0 3px #fbc02d; 
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .cell:active { transform: scale(0.95); }
        .cell.correct-answer { background: #ffeb3b !important; border: 3px solid #e91e63; box-shadow: 0 0 10px #e91e63; z-index: 10; transform: scale(1.1); }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.96); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; 
            padding: 20px 0;
        }

        /* 中サイズ広告コンテナ（i-mobile & ガード） */
        #ad-middle-container { 
            width: 320px; height: 100px; background: #eee; margin: 15px 0; 
            display: none; justify-content: center; align-items: center; 
            overflow: hidden; flex-shrink: 0; border: 1px solid #ddd;
            transition: opacity 0.3s;
        }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 240px; padding: 15px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #fbc02d; color: #333; box-shadow: 0 4px #f57f17; }
        #retry-btn:disabled { background: #ccc; color: #888; box-shadow: none; cursor: default; }
        #more-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }

        /* 大広告用（共通仕様） */
        #bigAdScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; justify-content: center; align-items: center; }
        .ad-frame-wrapper { width: 95%; height: 85%; position: relative; }
        .ad-close-btn { position: absolute; top: -15px; right: -15px; color: white; font-size: 32px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.7); width: 44px; height: 44px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 3100; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="ad-top"><iframe id="frame-top" src="./ad.html?pos=top"></iframe></div>

    <div id="game-outer">
        <div id="main-container">
            <div id="header-ui">
                <div id="ui" class="info-box">SCORE: 0</div>
                <div id="timer-text" class="info-box">残り: 7.0s</div>
            </div>
            <div style="font-weight:bold; color:#f57f17; margin: 5px 0; font-size: 14px;">仲間はずれをタップ！</div>
            <div id="grid"></div>

            <div id="menuScreen">
                <h2 id="result-msg" style="color:#f57f17; margin: 10px 0; font-size: 24px; text-align: center;">Target Search</h2>
                <p id="sub-msg" style="font-size: 13px; color: #666; margin: 0 0 10px 0; text-align: center;">1つだけ違う文字を探し出そう！</p>
                
                <div id="ad-middle-container">
                    <div id="im-8b492cea6667490da71c488bdcc7cfc8">
                        <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
                        <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1924211,type:"banner",display:"inline",elementid:"im-8b492cea6667490da71c488bdcc7cfc8"})</script>
                    </div>
                </div>

                <div class="menu-btn-group">
                    <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
                    <a href="https://saaaachi.github.io/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
                </div>
            </div>

            <div id="bigAdScreen">
                <div class="ad-frame-wrapper">
                    <div id="ad-close-btn" class="ad-close-btn" onclick="closeBigAd()">×</div>
                    <iframe id="ad-large-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="ad-bottom"><iframe id="frame-bottom" src="./ad.html?pos=bottom"></iframe></div>

    <script>
        let score = 0, gameActive = false, timeLeft, countdownInterval, playCount = 0;
        let targetElement = null;
        const chars = ["大", "太", "犬", "天", "矢", "失", "白", "百", "問", "間", "己", "已", "徴", "微", "幸", "辛", "由", "甲", "買", "貝"];

        const menuScreen = document.getElementById("menuScreen");
        const adMid = document.getElementById("ad-middle-container");
        const resultMsg = document.getElementById("result-msg");
        const retryBtn = document.getElementById("retry-btn");
        const grid = document.getElementById("grid");

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0; gameActive = true;
            document.getElementById("ui").innerText = "SCORE: 0";
            nextLevel();
        }

        function nextLevel() {
            if(!gameActive) return;
            grid.innerHTML = "";
            const pairIdx = Math.floor(Math.random() * (chars.length / 2)) * 2;
            const base = chars[pairIdx];
            const target = chars[pairIdx + 1];
            const targetIdx = Math.floor(Math.random() * 36);

            for(let i=0; i<36; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.innerText = (i === targetIdx) ? target : base;
                if(i === targetIdx) targetElement = cell;
                
                cell.onpointerdown = (e) => {
                    e.preventDefault();
                    if(!gameActive) return;
                    if(i === targetIdx) { 
                        score++; 
                        document.getElementById("ui").innerText = "SCORE: " + score; 
                        nextLevel(); 
                    } else { 
                        gameOver("ちがうよ！😱"); 
                    }
                };
                grid.appendChild(cell);
            }

            timeLeft = Math.max(1.5, 7.0 - (score * 0.4)); 
            startCountdown();
        }

        function startCountdown() {
            clearInterval(countdownInterval);
            updateTimerText();
            countdownInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerText();
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    gameOver("時間切れ！⏳");
                }
            }, 100);
        }

        function updateTimerText() {
            document.getElementById("timer-text").innerText = "残り: " + Math.max(0, timeLeft).toFixed(1) + "s";
        }

        function gameOver(msg) {
            gameActive = false;
            playCount++;
            clearInterval(countdownInterval);
            
            if(targetElement) targetElement.classList.add('correct-answer');

            // --- ✨ 誤タップ防止ガード発動 (1.5秒) ---
            retryBtn.innerText = "お待ちください...";
            retryBtn.disabled = true;
            adMid.style.display = "flex";
            adMid.style.pointerEvents = "none";
            adMid.style.opacity = "0.4";

            setTimeout(() => {
                resultMsg.innerText = "GAME OVER";
                document.getElementById("sub-msg").innerText = msg + "\nSCORE: " + score;
                menuScreen.style.display = "flex";
                menuScreen.scrollTop = 0;

                // 1.5秒後にボタンと広告を有効化
                setTimeout(() => {
                    adMid.style.pointerEvents = "auto";
                    adMid.style.opacity = "1";
                    retryBtn.disabled = false;
                    retryBtn.innerText = "もう一度遊ぶ";
                }, 1500);

                // 大広告判定
                if (playCount === 3 || (playCount > 3 && (playCount - 3) % 7 === 0)) {
                    setTimeout(showBigAd, 500);
                }
            }, 800);
        }

        function showBigAd() {
            const screen = document.getElementById("bigAdScreen");
            const closeBtn = document.getElementById("ad-close-btn");
            const frame = document.getElementById("ad-large-frame");
            frame.src = "./ad.large.html?t=" + Date.now();
            screen.style.display = "flex";
            closeBtn.style.display = "none";
            setTimeout(() => { closeBtn.style.display = "flex"; }, 5000); // 5秒固定
        }

        function closeBigAd() {
            document.getElementById("bigAdScreen").style.display = "none";
            document.getElementById("ad-large-frame").src = "";
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
